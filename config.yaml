# Configuration for the ML portfolio engine.
# CLI flags (see scripts/run_backtest.py) override anything set here.

seed: 42

universe:
  # Liquid, diversified ETF sleeve. SPY/QQQ equity, TLT/IEF bonds, GLD gold, etc.
  tickers: [SPY, QQQ, EFA, TLT, IEF, GLD, DBC]
  bond_proxy: TLT          # used for the 60/40 baseline
  equity_proxy: SPY        # used for the 60/40 baseline

dates:
  start: "2010-01-01"
  end: "2024-12-31"

data:
  vix_ticker: "^VIX"
  # FRED series: 10y-2y term spread, 10y yield, BAA-AAA credit spread.
  fred_series: [T10Y2Y, DGS10, BAA10Y]
  cache_dir: "data_cache"

features:
  momentum_windows: [21, 63, 126]   # ~1m, 3m, 6m trading days
  vol_window: 21
  ma_windows: [50, 200]

regime:
  n_regimes: 2
  covariance_type: "full"
  n_iter: 200
  # Risk multiplier applied to the optimizer's risk-aversion per detected regime,
  # ordered from calmest to most turbulent. Higher => more conservative.
  risk_scaling: [1.0, 2.5]

forecast:
  model: random_forest
  n_estimators: 300
  max_depth: 5
  min_samples_leaf: 20

optimize:
  rebalance: "M"          # monthly rebalancing
  lookback_days: 252       # trailing window for covariance estimation
  risk_aversion: 3.0       # base Markowitz/BL risk aversion (lambda)
  bl_tau: 0.05             # Black-Litterman uncertainty scaler
  max_weight: 0.40         # per-asset cap
  min_weight: 0.0          # long-only
  allow_short: false

backtest:
  transaction_cost_bps: 10   # round-trip cost per unit turnover, in basis points
  warmup_days: 504           # data needed before first allocation (~2y)

output:
  dir: "outputs"
