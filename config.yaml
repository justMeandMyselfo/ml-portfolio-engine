# Configuration for the ML portfolio engine.
# CLI flags (see scripts/run_backtest.py) override anything set here.

seed: 42

universe:
  tickers: [SPY, QQQ, IWM, EFA, EEM, TLT, IEF, LQD, HYG, TIP, GLD, DBC, VNQ]
  bond_proxy: TLT
  equity_proxy: SPY

dates:
  start: "2010-01-01"
  end: "2024-12-31"

data:
  vix_ticker: "^VIX"
  fred_series: [T10Y2Y, DGS10, BAA10Y]
  cache_dir: "data_cache"

features:
  momentum_windows: [21, 63, 126, 252]
  vol_window: 21
  ma_windows: [50, 200]

regime:
  n_regimes: 2
  covariance_type: "full"
  n_iter: 200
  risk_scaling: [1.0, 2.5]

forecast:
  model: random_forest
  n_estimators: 300
  max_depth: 5
  min_samples_leaf: 20
  shrinkage: 0.5

optimize:
  rebalance: "M"
  lookback_days: 252
  risk_aversion: 3.0
  bl_tau: 0.05
  max_weight: 0.40
  min_weight: 0.0
  allow_short: false
  vol_targeting: true
  target_vol: 0.10
  max_leverage: 1.0

backtest:
  transaction_cost_bps: 10
  warmup_days: 504
  smoothing: 0.6
  no_trade_band: 0.01
  risk_free_annual: 0.02

output:
  dir: "outputs"
